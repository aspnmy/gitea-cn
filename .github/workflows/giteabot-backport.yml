name: giteabot backport

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  giteabot:
    if: github.repository == 'aspnmy/gitea-cn'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: aspnmy/gitea-cnbot@f8a6f4c14d46920b4b5448852be3de72d00066f0 # v1.0.3
        with:
          github_token: ${{ secrets.GITEABOT_TOKEN }}
          gitea_fork: giteabot/gitea
          checks: backport
